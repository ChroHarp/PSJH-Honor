<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平興數枝扭蛋機</title>
    <style>
        /* 復古拼貼賽博龐克 & 混合媒介風格 */
        :root {
            --bg-paper: #EFE9D9;
            --primary-orange: #FF5722;
            --primary-blue: #1A237E;
            --accent-yellow: #FFC107;
            --black: #111111;
            --border-thick: 4px solid var(--black);
        }

        body {
            background-color: var(--bg-paper);
            color: var(--black);
            font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 20px;
            /* 網點背景效果 */
            background-image: radial-gradient(var(--black) 10%, transparent 10%);
            background-size: 12px 12px;
            background-position: 0 0, 6px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--bg-paper);
            border: var(--border-thick);
            box-shadow: 8px 8px 0px var(--primary-blue);
            max-width: 800px;
            width: 100%;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: var(--primary-orange);
            color: white;
            padding: 10px;
            border: var(--border-thick);
            transform: rotate(-2deg);
            margin-top: -10px;
            box-shadow: 4px 4px 0px var(--black);
        }

        /* 控制面板 */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            background-color: #fff;
            padding: 15px;
            border: 2px dashed var(--black);
        }

        .checkbox-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            font-weight: bold;
        }

        .checkbox-group label {
            background-color: var(--accent-yellow);
            padding: 5px 10px;
            border: 2px solid var(--black);
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            transition: transform 0.1s;
        }
        
        .checkbox-group label:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--black);
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
            font-size: 1.2rem;
            border: 2px solid var(--black);
            text-align: center;
        }

        .btn {
            background-color: var(--primary-blue);
            color: white;
            border: var(--border-thick);
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .btn:hover {
            background-color: #283593;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--black);
        }

        .btn-clear {
            background-color: #d32f2f;
        }

        /* 扭蛋機動畫區 */
        .gacha-area {
            height: 600px; /* ★ 高度提高到 600px */
            border: var(--border-thick);
            background-color: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%, #f0f0f0), 
                        linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%, #f0f0f0);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .machine {
            width: 150px;
            height: 200px;
            background-color: var(--primary-orange);
            border: var(--border-thick);
            position: relative;
            z-index: 2;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        .machine-glass {
            width: 110px;
            height: 110px;
            background-color: rgba(255,255,255,0.8);
            border: var(--border-thick);
            border-radius: 50%;
            margin: 10px auto;
            position: relative;
            overflow: hidden;
        }

        /* ★ 新增：內部裝飾用小扭蛋 */
        .deco-ball {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 2px solid var(--black);
            border-radius: 50%;
            /* 加上內陰影讓它更立體 */
            box-shadow: inset -5px -5px 0px rgba(0,0,0,0.2);
        }

        .knob {
            width: 40px;
            height: 40px;
            background-color: var(--accent-yellow);
            border: var(--border-thick);
            border-radius: 50%;
            margin: 10px auto;
            position: relative;
        }

        .knob::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 40px;
            background-color: var(--black);
            left: 13px;
            top: -4px;
        }

        .gacha-ball {
            width: 60px;
            height: 60px;
            border: var(--border-thick);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(to bottom, #ff5252 50%, #fff 50%);
            z-index: 3;
            display: none;
        }

        /* 撕紙邊緣顯示結果 */
        .result-reveal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background-color: #fff;
            padding: 25px 50px;
            z-index: 10;
            text-align: center;
            max-height: 85%; /* 防止紙條超出動畫區 */
            display: flex;
            flex-direction: column;
            width: 250px;
            /* 模擬撕紙邊緣 */
            clip-path: polygon(
                0% 2%, 5% 0%, 10% 4%, 15% 1%, 20% 3%, 25% 0%, 30% 3%, 35% 1%, 40% 4%, 45% 0%, 50% 3%, 55% 1%, 60% 4%, 65% 0%, 70% 3%, 75% 0%, 80% 2%, 85% 1%, 90% 4%, 95% 0%, 100% 2%,
                100% 98%, 95% 100%, 90% 96%, 85% 99%, 80% 97%, 75% 100%, 70% 96%, 65% 99%, 60% 96%, 55% 99%, 50% 97%, 45% 99%, 40% 96%, 35% 99%, 30% 97%, 25% 100%, 20% 96%, 15% 99%, 10% 96%, 5% 100%, 0% 98%
            );
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(0,0,0,0.1);
        }

        .result-reveal.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .result-reveal h2 {
            margin: 0 0 10px 0;
            color: var(--primary-blue);
            font-size: 1.8rem;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        /* 滑動視窗限制區塊 */
        .names-window {
            overflow: hidden;
            flex-grow: 1;
            position: relative;
            /* 讓上下邊緣有淡淡的漸層消失效果 */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        .drawn-names {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-orange);
            padding: 20px 0; 
            position: relative;
        }

        /* CSS 動態往復滾動動畫 */
        @keyframes pingPongScroll {
            0%, 15% { transform: translateY(0); }
            85%, 100% { transform: translateY(var(--scroll-dist)); }
        }

        /* 放射狀光芒 (爆開效果) */
        .sunburst {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-conic-gradient(var(--accent-yellow) 0 15deg, transparent 15deg 30deg);
            z-index: 1;
            animation: rotate 10s linear infinite;
            display: none;
            opacity: 0.8;
        }

        /* 歷史紀錄區 */
        .history-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-title {
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: var(--border-thick);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-item {
            background-color: var(--primary-blue);
            color: white;
            padding: 5px 10px;
            border: 2px solid var(--black);
            font-weight: bold;
            box-shadow: 2px 2px 0px var(--black);
            animation: popIn 0.3s ease-out;
        }

        /* 動畫 Keyframes */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes dropBall {
            0% { top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { top: 75%; left: 50%; transform: translate(-50%, -50%) scale(1) rotate(360deg); } /* 因為高度變高，微調掉落終點比例 */
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* ★ 新增：小扭蛋瘋狂彈跳的 Keyframes */
        @keyframes bounce1 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(25px, -45px) rotate(45deg); }
            66% { transform: translate(40px, -15px) rotate(90deg); }
        }
        @keyframes bounce2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-30px, -40px) rotate(-45deg); }
            66% { transform: translate(-15px, -55px) rotate(-90deg); }
        }
        @keyframes bounce3 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-20px, -50px) rotate(60deg); }
            66% { transform: translate(20px, -20px) rotate(120deg); }
        }

        .animating-machine {
            animation: shake 0.5s;
            animation-iteration-count: 3; /* 震動 1.5 秒 */
        }
        
        .animating-knob {
            animation: rotate 1.5s linear;
        }

        .animating-ball {
            display: block;
            animation: dropBall 1s forwards;
        }

        /* 當玻璃罩加上 .animating-balls 時，裡面的小球開始亂跳 */
        .animating-balls .ball-1 { animation: bounce1 0.35s infinite ease-in-out; }
        .animating-balls .ball-2 { animation: bounce2 0.28s infinite ease-in-out; }
        .animating-balls .ball-3 { animation: bounce3 0.32s infinite ease-in-out; }
        .animating-balls .ball-4 { animation: bounce2 0.40s infinite ease-in-out reverse; }
        .animating-balls .ball-5 { animation: bounce1 0.30s infinite ease-in-out reverse; }

    </style>
</head>
<body>

<div class="container">
    <h1>✂️ 平興數枝扭蛋機</h1>

    <div class="controls">
        <div class="checkbox-group" id="group-checkboxes">
            </div>
        
        <div class="input-group">
            <label for="draw-count">抽出人數:</label>
            <input type="number" id="draw-count" value="1" min="1" max="15">
        </div>

        <button class="btn" id="btn-draw">開始抽籤 (DRAW)</button>
        <button class="btn btn-clear" id="btn-clear">清除紀錄</button>
    </div>

    <div class="gacha-area">
        <div class="sunburst" id="sunburst"></div>
        <div class="machine" id="machine">
            <div class="machine-glass" id="machine-glass">
                <div class="deco-ball ball-1" style="background:#ff5252; top:70px; left:10px;"></div>
                <div class="deco-ball ball-2" style="background:#448aff; top:75px; left:40px;"></div>
                <div class="deco-ball ball-3" style="background:#ffeb3b; top:65px; left:70px;"></div>
                <div class="deco-ball ball-4" style="background:#4caf50; top:80px; left:25px;"></div>
                <div class="deco-ball ball-5" style="background:#9c27b0; top:80px; left:55px;"></div>
            </div>
            <div class="knob" id="knob"></div>
        </div>
        <div class="gacha-ball" id="gacha-ball"></div>
        
        <div class="result-reveal" id="result-reveal">
            <h2>🎉 中獎名單 🎉</h2>
            <div class="names-window" id="names-window">
                <div class="drawn-names" id="drawn-names"></div>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title">
            <span>📜 抽籤紀錄</span>
            <span id="remaining-count" style="font-size: 1rem; color: var(--primary-orange);">剩餘人數: 0</span>
        </div>
        <div class="history-list" id="history-list">
            </div>
    </div>
</div>

<script>
    // 原始資料
    const rawData = `分組	班級	座號	姓名
7A	703	17	許羽昀
7A	708	10	黃以理
7A	708	27	盧映彤
7A	711	13	饒閔元
7B	701	14	吳采薇
7B	701	17	林少筠
7B	705	2	余侑霖
7B	706	2	吳昱穎
7C	712	13	顏楷恩
7C	713	27	鍾妍瑾
7C	714	11	賴韋諺
7C	715	5	柯炳綸
8A	802	2	宋泓錡
8A	802	29	朱宸緯
8A	803	29	王彤綺
8A	803	19	李紫晴
8B	807	6	陳彥澄
8B	807	8	温傑宇
8B	809	25	温欣庭
8B	812	29	龐羽彤
9A	905	4	沈軒毅
9A	910	17	李姸均
9A	911	7	黃于展`;

    let students = [];
    let groups = new Set();
    let isAnimating = false;

    // 解析資料
    function parseData() {
        const lines = rawData.trim().split('\n');
        for (let i = 1; i < lines.length; i++) {
            const [group, classNum, seatNum, name] = lines[i].split('\t');
            if (group && name) {
                students.push({
                    group: group.trim(),
                    classNum: classNum.trim(),
                    seatNum: seatNum.trim(),
                    name: name.trim(),
                    drawn: false
                });
                groups.add(group.trim());
            }
        }
    }

    // 初始化 UI
    function initUI() {
        const checkboxContainer = document.getElementById('group-checkboxes');
        Array.from(groups).sort().forEach(group => {
            const label = document.createElement('label');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = group;
            checkbox.checked = true;
            checkbox.addEventListener('change', updateRemainingCount);
            
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(' ' + group));
            checkboxContainer.appendChild(label);
        });
        updateRemainingCount();
    }

    // 取得當前可抽籤的名單
    function getAvailableStudents() {
        const selectedGroups = Array.from(document.querySelectorAll('#group-checkboxes input:checked')).map(cb => cb.value);
        return students.filter(s => selectedGroups.includes(s.group) && !s.drawn);
    }

    function updateRemainingCount() {
        const available = getAvailableStudents().length;
        document.getElementById('remaining-count').innerText = `剩餘人數: ${available}`;
    }

    // 抽籤主邏輯
    function drawLots() {
        if (isAnimating) return;

        const countInput = parseInt(document.getElementById('draw-count').value);
        if (isNaN(countInput) || countInput < 1) {
            alert("請輸入有效的抽出人數！");
            return;
        }

        const availableStudents = getAvailableStudents();
        if (availableStudents.length === 0) {
            alert("目前選擇的分組已經沒有未抽出的學生了！請勾選其他組別或清除紀錄。");
            return;
        }

        const drawCount = Math.min(countInput, availableStudents.length);
        if (countInput > availableStudents.length) {
            alert(`注意：所選分組僅剩 ${availableStudents.length} 人，將全數抽出。`);
        }

        let shuffled = [...availableStudents].sort(() => 0.5 - Math.random());
        let winners = shuffled.slice(0, drawCount);

        winners.forEach(w => {
            const index = students.findIndex(s => s.name === w.name && s.group === w.group);
            if (index !== -1) students[index].drawn = true;
        });

        playAnimation(winners);
    }

    // 播放復古動畫
    function playAnimation(winners) {
        isAnimating = true;
        const machine = document.getElementById('machine');
        const machineGlass = document.getElementById('machine-glass'); // 取得玻璃罩元素
        const knob = document.getElementById('knob');
        const ball = document.getElementById('gacha-ball');
        const reveal = document.getElementById('result-reveal');
        const sunburst = document.getElementById('sunburst');
        const namesContainer = document.getElementById('drawn-names');

        reveal.classList.remove('show');
        sunburst.style.display = 'none';
        ball.style.display = 'none';
        ball.style.animation = 'none';
        
        // 進入前先取消原本的滑動動畫
        namesContainer.style.animation = 'none';
        namesContainer.style.transform = 'translateY(0)';

        // 啟動機器震動與內部扭蛋彈跳
        machine.classList.add('animating-machine');
        knob.classList.add('animating-knob');
        machineGlass.classList.add('animating-balls'); // ★ 觸發小球彈跳

        setTimeout(() => {
            // 停止機器震動與內部扭蛋彈跳
            machine.classList.remove('animating-machine');
            knob.classList.remove('animating-knob');
            machineGlass.classList.remove('animating-balls'); // ★ 停止小球彈跳
            
            ball.style.display = 'block';
            ball.style.animation = 'dropBall 1s forwards cubic-bezier(0.25, 1, 0.5, 1)';

            setTimeout(() => {
                ball.style.display = 'none';
                sunburst.style.display = 'block';
                
                namesContainer.innerHTML = winners.map(w => 
                    `<div>${w.group} - ${w.classNum}班 ${w.seatNum}號 <br> <span style="font-size: 1.8rem;">${w.name}</span></div>`
                ).join('<hr style="border-top: 2px dashed #111; margin: 10px 0;">');

                reveal.classList.add('show');

                // 計算名單高度，決定是否啟動往復滑動動畫
                setTimeout(() => {
                    const windowEl = document.getElementById('names-window');
                    const overage = namesContainer.scrollHeight - windowEl.clientHeight;
                    
                    if (overage > 0) {
                        namesContainer.style.setProperty('--scroll-dist', `-${overage}px`);
                        const duration = Math.max(3, overage / 30); 
                        namesContainer.style.animation = `pingPongScroll ${duration}s ease-in-out 1s infinite alternate`;
                    }
                }, 550); 

                addToHistory(winners);
                updateRemainingCount();
                
                setTimeout(() => {
                    isAnimating = false;
                }, 500);

            }, 1100); 

        }, 1500); // 機器震動時間
    }

    function addToHistory(winners) {
        const historyList = document.getElementById('history-list');
        winners.forEach(w => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = `${w.group} | ${w.name}`;
            historyList.insertBefore(item, historyList.firstChild);
        });
    }

    function clearHistory() {
        if (isAnimating) return;
        if (confirm("確定要清除所有抽籤紀錄嗎？這將重置所有學生的抽籤狀態。")) {
            students.forEach(s => s.drawn = false);
            document.getElementById('history-list').innerHTML = '';
            document.getElementById('result-reveal').classList.remove('show');
            document.getElementById('sunburst').style.display = 'none';
            document.getElementById('drawn-names').style.animation = 'none';
            updateRemainingCount();
        }
    }

    document.getElementById('btn-draw').addEventListener('click', drawLots);
    document.getElementById('btn-clear').addEventListener('click', clearHistory);

    parseData();
    initUI();
</script>

</body>
</html>
